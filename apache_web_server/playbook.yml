---
- name: Apache web server config management 
  hosts: localhost
  become: yes
  tasks:
    - name: installing apache2
      apt:
        name: apache2
        state: present
    
    - name: Start & enable apache2
      services:
        name: apache2
        state: started
        enabled: true

    - name: creating index.html
      copy:
        src: index.html
        dest: /var/www/index.html
