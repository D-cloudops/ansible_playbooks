#input the list of files to check compliance
critical_files:
   - path: "/etc/ssh/sshd_config"
     owner: "root"
     group: "root"
     mode: "0600"
   - path: "/etc/passwd"
     owner: "root"
     group: "root"
     mode: "0644"
   - path: "/etc/sudoers"
     owner: "root"
     group: "root"
     mode: "0440"

#app dir policy
app_dir:
  path: "/opt/myapp"
  owner: "root"
  group: "root"
  mode: "0755"
  recurse: true

#user/group auto-create
ensure_app_user: true

#compliance report location
report_dir: "/var/log/compliance"
report_file: "{{ report_dir }}/permission_{{ inventory_hostname }}.log"